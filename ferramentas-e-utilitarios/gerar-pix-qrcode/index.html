<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador PIX Funcional</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script src="https://unpkg.com/pix-payload@latest/dist/pix-payload.umd.js"></script>
<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.box{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  text-align:center;
  width:320px;
}
input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:none;
}
button{
  padding:10px;
  margin-top:8px;
  width:100%;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}
.gerar{background:#22c55e;}
.copy{background:#3b82f6;color:#fff;}
canvas{margin-top:15px;}
textarea{
  width:100%;
  height:80px;
  margin-top:10px;
  border-radius:6px;
  border:none;
  padding:8px;
}
</style>
</head>

<body>

<div class="box">
<h3>Gerador PIX</h3>

<input id="chave" placeholder="Chave PIX">
<input id="nome" placeholder="Nome (sem acento)">
<input id="cidade" placeholder="Cidade (sem acento)">
<input id="valor" placeholder="Valor (opcional)">

<button class="gerar" onclick="gerarPix()">Gerar QR Code</button>
<button class="copy" onclick="copiar()">Copiar Código</button>

<canvas id="qr"></canvas>
<textarea id="codigo"></textarea>
</div>

<script>

// CRC16 correto
function crc16(str){
  let crc = 0xFFFF;
  for(let c=0;c<str.length;c++){
    crc ^= str.charCodeAt(c) << 8;
    for(let i=0;i<8;i++){
      if((crc <<= 1) & 0x10000) crc ^= 0x1021;
      crc &= 0xFFFF;
    }
  }
  return crc.toString(16).toUpperCase().padStart(4,'0');
}

function emv(id, valor){
  return id + valor.length.toString().padStart(2,'0') + valor;
}

function limpar(txt, max){
  return (txt || '')
    .normalize("NFD")
    .replace(/[^A-Z0-9 ]/gi,"")
    .toUpperCase()
    .substring(0,max);
}

function gerarPayload(chave, nome, cidade, valor){

  nome = limpar(nome || 'NOME',25);
  cidade = limpar(cidade || 'CIDADE',15);

  let payload = '';

  payload += emv('00','01');

  // 🔥 CORREÇÃO PRINCIPAL (obrigatório)
  payload += emv('01','12');

  let merchant = '';
  merchant += emv('00','BR.GOV.BCB.PIX');
  merchant += emv('01', chave);

  payload += emv('26', merchant);

  payload += emv('52','0000');
  payload += emv('53','986');

  if(valor && parseFloat(valor) > 0){
    payload += emv('54', parseFloat(valor).toFixed(2));
  }

  payload += emv('58','BR');
  payload += emv('59', nome);
  payload += emv('60', cidade);

  payload += emv('62', emv('05','***'));

  payload += '6304';

  payload += crc16(payload);

  return payload;
}

function gerarPix(){

  let chave = document.getElementById('chave').value.trim();
  let nome = document.getElementById('nome').value;
  let cidade = document.getElementById('cidade').value;
  let valor = document.getElementById('valor').value.replace(',','.');

  if(!chave){
    alert('Digite a chave PIX');
    return;
  }

  let payload = gerarPayload(chave, nome, cidade, valor);

  document.getElementById('codigo').value = payload;

  QRCode.toCanvas(document.getElementById('qr'), payload, {
    width:256
  });
}

function copiar(){
  let txt = document.getElementById('codigo');
  txt.select();
  document.execCommand('copy');
  alert('Código copiado!');
}

</script>

</body>
</html>
