<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle de Clientes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-4">

<div class="max-w-4xl mx-auto">
  <h1 class="text-3xl font-bold text-center mb-2">Controle de Clientes</h1>

  <p id="contadorClientes" class="text-center text-green-400 mb-6"></p>

  <!-- FORM -->
  <div class="bg-black p-6 rounded-xl mb-6">
    <form id="clientForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <input type="hidden" id="idOriginal">

      <input id="nome" placeholder="Nome" class="p-3 rounded bg-gray-800">
      <input id="whatsapp" placeholder="WhatsApp" class="p-3 rounded bg-gray-800">
      <input id="email" placeholder="Email" class="p-3 rounded bg-gray-800">
      <input id="endereco" placeholder="Endereço" class="p-3 rounded bg-gray-800">

      <input id="produto" placeholder="Serviço / Produto" class="p-3 rounded bg-gray-800">
      <input id="valor" type="number" step="0.01" placeholder="Valor" class="p-3 rounded bg-gray-800">
      <input id="data" type="date" class="p-3 rounded bg-gray-800">

      <button class="col-span-2 bg-blue-600 p-3 rounded">Salvar</button>
    </form>
  </div>

  <!-- BACKUP + PESQUISA -->
  <div class="bg-black p-6 rounded-xl mb-6">

    <div class="flex flex-col md:flex-row gap-3 mb-4">
      <button onclick="fazerBackup()" class="bg-green-600 px-4 py-2 rounded">
        Fazer Backup
      </button>

      <button onclick="document.getElementById('inputBackup').click()" class="bg-yellow-600 px-4 py-2 rounded">
        Restaurar Backup
      </button>

      <input type="file" id="inputBackup" accept="application/json" class="hidden">

      <button onclick="copiarEmails()" class="bg-blue-600 px-4 py-2 rounded">
        Copiar e-mails
      </button>
    </div>

    <input id="pesquisa" placeholder="Pesquisar..." class="w-full p-3 rounded bg-gray-800 mb-4">

    <div id="resultado"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center">
  <div class="bg-gray-800 p-6 rounded-xl max-w-lg w-full">
    <h2 id="modalNome" class="text-xl font-bold mb-4"></h2>

    <div id="modalConteudo"></div>

    <button onclick="mostrarFormularioServico()" class="bg-blue-600 p-2 rounded w-full mt-3">
      + Adicionar Serviço
    </button>

    <div id="formServico" class="hidden mt-4">
      <input id="novoProduto" placeholder="Serviço" class="w-full p-2 mb-2 bg-gray-700 rounded">
      <input id="novoValor" type="number" placeholder="Valor" class="w-full p-2 mb-2 bg-gray-700 rounded">
      <input id="novaData" type="date" class="w-full p-2 mb-2 bg-gray-700 rounded">

      <button onclick="salvarServico()" class="bg-green-600 p-2 rounded w-full">
        Salvar Serviço
      </button>
    </div>

    <button onclick="fecharModal()" class="mt-4 bg-red-600 p-2 rounded w-full">Fechar</button>
  </div>
</div>

<script>
let clientes = JSON.parse(localStorage.getItem('clientes')) || {};
let clienteAtual = null;

const form = document.getElementById('clientForm');
const pesquisa = document.getElementById('pesquisa');
const resultado = document.getElementById('resultado');
const contador = document.getElementById('contadorClientes');

function salvar() {
  localStorage.setItem('clientes', JSON.stringify(clientes));
}

// FORM
form.addEventListener('submit', e => {
  e.preventDefault();

  const idOriginal = form.idOriginal.value;
  const nome = form.nome.value.trim();
  const whatsapp = form.whatsapp.value.trim();
  const email = form.email.value.trim();
  const endereco = form.endereco.value.trim();
  const produto = form.produto.value.trim();
  const valor = form.valor.value.trim();
  const data = form.data.value;

  if (!nome) return alert("Nome obrigatório");

  let id = idOriginal || crypto.randomUUID();

  if (!clientes[id]) {
    clientes[id] = { id, nome, whatsapp, email, endereco, historico: [] };
  } else {
    Object.assign(clientes[id], { nome, whatsapp, email, endereco });
  }

  if (produto && valor && data) {
    clientes[id].historico.push({ produto, valor, data });
  }

  salvar();
  form.reset();
  atualizar();
});

// PESQUISA
pesquisa.addEventListener('input', atualizar);

function atualizar() {
  const termo = pesquisa.value.toLowerCase();
  resultado.innerHTML = '';

  const lista = Object.values(clientes);
  contador.innerText = `Total de clientes: ${lista.length}`;

  lista.forEach(c => {
    if (
      termo === '' ||
      c.nome.toLowerCase().includes(termo) ||
      (c.whatsapp && c.whatsapp.includes(termo)) ||
      (c.email && c.email.toLowerCase().includes(termo))
    ) {
      const div = document.createElement('div');
      div.className = 'p-4 bg-gray-700 rounded mb-3 cursor-pointer';
      div.innerHTML = `
        <strong>${c.nome}</strong><br>
        📱 ${c.whatsapp || '-'}<br>
        ✉️ ${c.email || '-'}
      `;
      div.onclick = () => abrirModal(c.id);
      resultado.appendChild(div);
    }
  });

  if (!resultado.innerHTML) {
    resultado.innerHTML = `<p class="text-red-400">Nenhum encontrado</p>`;
  }
}

// MODAL
function abrirModal(id) {
  clienteAtual = id;
  document.getElementById('modal').classList.remove('hidden');
  renderModal();
}

function renderModal() {
  const c = clientes[clienteAtual];
  document.getElementById('modalNome').innerText = c.nome;

  let total = 0;
  let html = `<p>📱 ${c.whatsapp || '-'}</p><p>✉️ ${c.email || '-'}</p><hr class="my-3">`;

  c.historico.forEach(h => {
    total += parseFloat(h.valor);
    html += `
      <div class="mb-2 p-2 bg-gray-700 rounded">
        ${h.produto} - R$ ${h.valor} - ${h.data}
      </div>`;
  });

  html += `<p class="text-green-400 font-bold">Total: R$ ${total.toFixed(2)}</p>`;
  document.getElementById('modalConteudo').innerHTML = html;
}

function mostrarFormularioServico() {
  document.getElementById('formServico').classList.toggle('hidden');
}

function salvarServico() {
  const produto = novoProduto.value;
  const valor = novoValor.value;
  const data = novaData.value;

  if (!produto || !valor || !data) return alert("Preencha tudo");

  clientes[clienteAtual].historico.push({ produto, valor, data });

  salvar();
  renderModal();
  atualizar();
}

// EMAILS
function copiarEmails() {
  const emails = [...new Set(
    Object.values(clientes)
      .map(c => c.email?.trim())
      .filter(e => e && e.includes('@'))
  )];

  navigator.clipboard.writeText(emails.join(', '))
    .then(() => alert("Copiado!"));
}

// BACKUP
async function fazerBackup() {
  const json = JSON.stringify(clientes, null, 2);

  if ('showSaveFilePicker' in window) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: 'backup_clientes.json',
        types: [{ accept: { 'application/json': ['.json'] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(json);
      await writable.close();
      alert('Backup salvo!');
    } catch {}
  } else {
    const blob = new Blob([json], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'backup_clientes.json';
    a.click();
  }
}

// RESTAURAR
document.getElementById('inputBackup').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    clientes = JSON.parse(e.target.result);
    salvar();
    atualizar();
    alert('Backup restaurado!');
  };
  reader.readAsText(file);
});

function fecharModal() {
  document.getElementById('modal').classList.add('hidden');
}

window.addEventListener('DOMContentLoaded', atualizar);
</script>

</body>
</html>
