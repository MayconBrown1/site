  <script>
const defaultConfig = {
  page_title: 'Gerador de Contrato de Locação',
  background_color: '#f8fafc',
  surface_color: '#ffffff',
  text_color: '#1e293b',
  primary_action_color: '#1e3a5f',
  secondary_action_color: '#475569',
  font_family: 'DM Sans',
  font_size: 16
};

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  document.body.style.backgroundColor = c.background_color;
  document.getElementById('page-title').textContent = c.page_title;
  document.querySelectorAll('.section-card').forEach(el => el.style.backgroundColor = c.surface_color);
  document.querySelectorAll('h1, h2').forEach(el => el.style.color = c.text_color);
  const font = c.font_family + ", 'DM Sans', sans-serif";
  document.body.style.fontFamily = font;
  const base = c.font_size || 16;
  document.querySelectorAll('label').forEach(el => el.style.fontSize = (base * 0.85) + 'px');
  document.querySelectorAll('input').forEach(el => el.style.fontSize = base + 'px');
}

if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => applyConfig(config),
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: v => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
        { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: v => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
      ],
      borderables: [],
      fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
      fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
    }),
    mapToEditPanelValues: (config) => new Map([
      ['page_title', config.page_title || defaultConfig.page_title]
    ])
  });
}

function adicionarClausula() {
  const container = document.getElementById('lista-clausulas');

  const bloco = document.createElement('div');
  bloco.className = 'clausula-item border p-3 rounded-lg mt-3';

  bloco.innerHTML = `
    <label class="block text-sm mb-1">Título</label>
    <input class="titulo w-full border px-2 py-1 mb-2 rounded" 
      placeholder="Ex: CLÁUSULA EXTRA">

    <label class="block text-sm mb-1">Texto</label>
    <textarea class="texto w-full border px-2 py-1 rounded" rows="3"
      placeholder="Digite a cláusula..."></textarea>

    <button type="button" onclick="this.parentElement.remove()" 
      class="mt-2 text-red-500 text-xs">
      Remover
    </button>
  `;

  container.appendChild(bloco);
}

function v(id) { return document.getElementById(id).value.trim(); }

function atualizarExtenso() {
  const valorStr = document.getElementById('ct_valor').value.trim();

  if (!valorStr) {
    document.getElementById('ct_extenso').value = '';
    return;
  }

  const valorLimpo = valorStr.replace(/\D/g, '');
  const numero = parseInt(valorLimpo) || 0;

  const extenso = converterParaExtenso(numero);
  document.getElementById('ct_extenso').value = extenso + ' reais';
}

function converterParaExtenso(num) {
  const unidades = ['zero', 'um', 'dois', 'três', 'quatro', 'cinco', 'seis', 'sete', 'oito', 'nove'];
  const especiais = ['dez', 'onze', 'doze', 'treze', 'quatorze', 'quinze', 'dezesseis', 'dezessete', 'dezoito', 'dezenove'];
  const dezenas = ['', '', 'vinte', 'trinta', 'quarenta', 'cinquenta', 'sessenta', 'setenta', 'oitenta', 'noventa'];
  const escala = ['', 'mil', 'milhão', 'bilhão', 'trilhão'];

  if (num === 0) return 'zero';

  let resultado = '';
  let escalaIdx = 0;

  while (num > 0) {
    let grupo = num % 1000;
    if (grupo !== 0) {
      resultado = converterGrupo(grupo, unidades, especiais, dezenas) + (escala[escalaIdx] ? ' ' + escala[escalaIdx] : '') + (resultado ? ' ' + resultado : '');
    }
    num = Math.floor(num / 1000);
    escalaIdx++;
  }

  return resultado.trim();
}

function converterGrupo(num, unidades, especiais, dezenas) {
  let resultado = '';
  
  const centenas = Math.floor(num / 100);
  if (centenas > 0) {
    const cent = ['', 'cento', 'duzentos', 'trezentos', 'quatrocentos', 'quinhentos', 'seiscentos', 'setecentos', 'oitocentos', 'novecentos'];
    resultado += cent[centenas];
  }

  const resto = num % 100;
  if (resto !== 0) {
    if (resultado) resultado += ' e ';
    if (resto < 10) {
      resultado += unidades[resto];
    } else if (resto < 20) {
      resultado += especiais[resto - 10];
    } else {
      const dez = Math.floor(resto / 10);
      const un = resto % 10;
      resultado += dezenas[dez];
      if (un > 0) {
        resultado += ' e ' + unidades[un];
      }
    }
  }

  return resultado;
}

function formatDate(dateStr) {
  if (!dateStr) return '___/___/______';
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
}

function gerarContrato() {
  const d = {
    loc_nome: v('loc_nome') || '_______________', loc_estado: v('loc_estado') || '___________', loc_prof: v('loc_prof') || '___________',
    loc_rg: v('loc_rg') || '___________', loc_cpf: v('loc_cpf') || '___________', loc_end: v('loc_end') || '_______________',
    loc_cidade: v('loc_cidade') || '___________', loc_cep: v('loc_cep') || '________',
    locat_nome: v('locat_nome') || '_______________', locat_estado: v('locat_estado') || '___________', locat_prof: v('locat_prof') || '___________',
    locat_rg: v('locat_rg') || '___________', locat_cpf: v('locat_cpf') || '___________',
    im_end: v('im_end') || '_______________', im_num: v('im_num') || '____', im_comp: v('im_comp') || '____',
    im_bairro: v('im_bairro') || '___________', im_cidade: v('im_cidade') || '___________', im_cep: v('im_cep') || '________',
    ct_prazo: v('ct_prazo') || '12', ct_valor: v('ct_valor') || '___________', ct_extenso: v('ct_extenso') || '___________',
    ct_dia: v('ct_dia') || '5', ct_multa: v('ct_multa') || '10', ct_juros: v('ct_juros') || '1',
    ct_atraso: v('ct_atraso') || '30', ct_foro: v('ct_foro') || '___________', ct_data: formatDate(v('ct_data')),
  };

  const imovelCompleto = `${d.im_end}, nº ${d.im_num}, ${d.im_comp}, Bairro ${d.im_bairro}, ${d.im_cidade}, CEP ${d.im_cep}`;

let clausulasExtras = '';

document.querySelectorAll('.clausula-item').forEach((item, i) => {
  const titulo = item.querySelector('.titulo').value.trim();
  const texto = item.querySelector('.texto').value.trim();

  if (texto) {
    clausulasExtras += `
  <h2 style="font-size:14px; font-weight:700; margin:20px 0 8px; color:#1e3a5f;">
    ${titulo || 'CLÁUSULA ' + (14 + i)}
  </h2>
  <p>${texto}</p>
`;
  }
});

  const html = `
<div style="font-family: 'Merriweather', Georgia, serif; font-size: 13px; line-height: 1.8; color: #1a1a1a; max-width: 700px; margin: 0 auto;">
  <h1 style="text-align:center; font-size:18px; font-weight:700; margin-bottom:4px; letter-spacing:1px;">CONTRATO DE LOCAÇÃO DE IMÓVEL RESIDENCIAL</h1>
  <hr style="border:none; border-top:2px solid #1e3a5f; margin:12px 0 24px;">

  <p>Pelo presente instrumento particular de contrato de locação de imóvel residencial, de um lado, como <strong>LOCADOR(A)</strong>, <strong>${d.loc_nome}</strong>, ${d.loc_estado}, ${d.loc_prof}, portador(a) do RG nº ${d.loc_rg} e CPF nº ${d.loc_cpf}, residente e domiciliado(a) à ${d.loc_end}, ${d.loc_cidade}, CEP ${d.loc_cep}; e de outro lado, como <strong>LOCATÁRIO(A)</strong>, <strong>${d.locat_nome}</strong>, ${d.locat_estado}, ${d.locat_prof}, portador(a) do RG nº ${d.locat_rg} e CPF nº ${d.locat_cpf}, têm entre si justo e contratado o seguinte:</p>

  <h2 style="font-size:14px; font-weight:700; margin:20px 0 8px; color:#1e3a5f;">CLÁUSULA PRIMEIRA — DO OBJETO</h2>
  <p>O presente contrato tem como objeto a locação do imóvel residencial situado à <strong>${imovelCompleto}</strong>, de propriedade do(a) LOCADOR(A), que o cede ao(à) LOCATÁRIO(A) exclusivamente para fins residenciais.</p>

  <h2 style="font-size:14px; font-weight:700; margin:20px 0 8px; color:#1e3a5f;">CLÁUSULA SEGUNDA — DO PRAZO</h2>
  <p>A locação terá o prazo de <strong>${d.ct_prazo} (${extensoMeses(d.ct_prazo)}) meses</strong>, com início na data de assinatura deste contrato, podendo ser prorrogado por acordo entre as partes, mediante termo aditivo por escrito. Findo o prazo contratual, caso o(a) LOCATÁRIO(A) permaneça no imóvel sem oposição do(a) LOCADOR(A), a locação será prorrogada por prazo indeterminado, mantidas as demais condições contratuais.</p>

  <h2 style="font-size:14px; font-weight:700; margin:20px 0 8px; color:#1e3a5f;">CLÁUSULA TERCEIRA — DO ALUGUEL E FORMA DE PAGAMENTO</h2>
  <p>O valor mensal do aluguel é de <strong>R$ ${d.ct_valor} (${d.ct_extenso})</strong>, que deverá ser pago pelo(a) LOCATÁRIO(A) até o dia <strong>${d.ct_dia}</strong> de cada mês, mediante depósito bancário, transferência eletrônica ou outra forma previamente acordada entre as partes.</p>
  <p>O valor do aluguel será reajustado anualmente pelo índice IGP-M (Índice Geral de Preços do Mercado) da FGV, ou por outro índice que venha a substituí-lo, aplicado sobre o valor vigente do aluguel.</p>

  <h2 style="font-size:14px; font-weight:700; margin:20px 0 8px; color:#1e3a5f;">CLÁUSULA QUARTA — DA MULTA E JUROS POR ATRASO</h2>
  <p>Em caso de atraso no pagamento do aluguel, incidirá multa de <strong>${d.ct_multa}% (${extensoPorcentagem(d.ct_multa)} por cento)</strong> sobre o valor do aluguel, acrescida de juros moratórios de <strong>${d.ct_juros}% (${extensoPorcentagem(d.ct_juros)} por cento)</strong> ao mês, calculados pro rata die, a partir do vencimento até a data do efetivo pagamento.</p>

  <h2 style="font-size:14px; font-weight:700; margin:20px 0 8px; color:#1e3a5f;">CLÁUSULA QUINTA — DA UTILIZAÇÃO DO IMÓVEL</h2>
  <p>O imóvel objeto deste contrato destina-se exclusivamente ao uso residencial do(a) LOCATÁRIO(A) e de seus familiares, sendo vedada a sublocação, cessão ou empréstimo, total ou parcial, sem o consentimento prévio e por escrito do(a) LOCADOR(A).</p>
  <p>O(A) LOCATÁRIO(A) se obriga a manter o imóvel em perfeitas condições de higiene, limpeza e conservação, devolvendo-o ao final da locação nas mesmas condições em que o recebeu, ressalvado o desgaste natural pelo uso regular.</p>

  <h2 style="font-size:14px; font-weight:700; margin:20px 0 8px; color:#1e3a5f;">CLÁUSULA SEXTA — DAS BENFEITORIAS</h2>
  <p>Quaisquer benfeitorias ou modificações no imóvel somente poderão ser realizadas com autorização prévia e expressa do(a) LOCADOR(A), por escrito. As benfeitorias necessárias, ainda que não autorizadas, serão indenizáveis. As benfeitorias úteis, se autorizadas, serão indenizáveis e permitirão o exercício do direito de retenção. As benfeitorias voluptuárias não serão indenizáveis, podendo o(a) LOCATÁRIO(A) retirá-las, desde que não cause dano ao imóvel.</p>

  <h2 style="font-size:14px; font-weight:700; margin:20px 0 8px; color:#1e3a5f;">CLÁUSULA SÉTIMA — DAS DESPESAS E ENCARGOS</h2>
  <p>Ficam a cargo do(a) LOCATÁRIO(A), durante toda a vigência do contrato, as despesas de consumo de água, energia elétrica, gás, telefone, internet, condomínio (se houver), IPTU, taxas de lixo e demais encargos que incidam sobre o imóvel, devendo comprová-los sempre que solicitado pelo(a) LOCADOR(A).</p>

  <h2 style="font-size:14px; font-weight:700; margin:20px 0 8px; color:#1e3a5f;">CLÁUSULA OITAVA — DA VISTORIA</h2>
  <p>As partes realizarão vistoria do imóvel no início e no término da locação, documentando por escrito e, se possível, por fotografias, o estado de conservação do imóvel e de seus componentes. O laudo de vistoria inicial fará parte integrante deste contrato como anexo.</p>

  <h2 style="font-size:14px; font-weight:700; margin:20px 0 8px; color:#1e3a5f;">CLÁUSULA NONA — DA RESCISÃO</h2>
  <p>O presente contrato poderá ser rescindido:</p>
  <p style="margin-left:20px;">a) Por mútuo acordo entre as partes, mediante aviso prévio de 30 (trinta) dias por escrito;</p>
  <p style="margin-left:20px;">b) Pelo(a) LOCADOR(A), em caso de descumprimento de qualquer cláusula contratual pelo(a) LOCATÁRIO(A), especialmente o atraso no pagamento do aluguel por período superior a <strong>${d.ct_atraso} (${extensoDias(d.ct_atraso)}) dias</strong>;</p>
  <p style="margin-left:20px;">c) Pelo(a) LOCATÁRIO(A), a qualquer tempo, mediante aviso prévio de 30 (trinta) dias e pagamento de multa rescisória equivalente a 3 (três) aluguéis vigentes, proporcional ao período restante do contrato;</p>
  <p style="margin-left:20px;">d) Nas demais hipóteses previstas na Lei nº 8.245/1991 (Lei do Inquilinato).</p>

  <h2 style="font-size:14px; font-weight:700; margin:20px 0 8px; color:#1e3a5f;">CLÁUSULA DÉCIMA — DA DEVOLUÇÃO DO IMÓVEL</h2>
  <p>Ao término da locação, o(a) LOCATÁRIO(A) se obriga a devolver o imóvel nas mesmas condições em que o recebeu, conforme laudo de vistoria, livre de pessoas e objetos pessoais, no prazo máximo de 30 (trinta) dias após a comunicação de desocupação.</p>

  <h2 style="font-size:14px; font-weight:700; margin:20px 0 8px; color:#1e3a5f;">CLÁUSULA DÉCIMA PRIMEIRA — DA GARANTIA</h2>
  <p>Como garantia das obrigações assumidas neste contrato, o(a) LOCATÁRIO(A) oferece caução no valor equivalente a 3 (três) meses de aluguel, a ser devolvida ao final da locação, corrigida monetariamente, após a verificação do cumprimento de todas as obrigações contratuais e a entrega do imóvel em conformidade com o laudo de vistoria.</p>

  <h2 style="font-size:14px; font-weight:700; margin:20px 0 8px; color:#1e3a5f;">CLÁUSULA DÉCIMA SEGUNDA — DAS DISPOSIÇÕES GERAIS</h2>
  <p>O presente contrato é regido pela Lei nº 8.245, de 18 de outubro de 1991, e subsidiariamente pelo Código Civil Brasileiro.</p>
  <p>Quaisquer alterações neste contrato somente terão validade se feitas por escrito, mediante termo aditivo assinado por ambas as partes.</p>
  <p>As partes declaram ter lido e compreendido todas as cláusulas deste contrato, concordando integralmente com seus termos.</p>

  <h2 style="font-size:14px; font-weight:700; margin:20px 0 8px; color:#1e3a5f;">CLÁUSULA DÉCIMA TERCEIRA — DO FORO</h2>
  <p>Fica eleito o foro da comarca de <strong>${d.ct_foro}</strong> para dirimir quaisquer dúvidas ou litígios oriundos do presente contrato, com renúncia expressa de qualquer outro, por mais privilegiado que seja.</p>

function extensoMeses(n) {
  const nomes = ['zero','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze',
    'treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove','vinte','vinte e um','vinte e dois',
    'vinte e três','vinte e quatro','vinte e cinco','vinte e seis','vinte e sete','vinte e oito','vinte e nove',
    'trinta','trinta e um','trinta e dois','trinta e três','trinta e quatro','trinta e cinco','trinta e seis'];
  const num = parseInt(n);
  return nomes[num] || n;
}
function extensoPorcentagem(n) { return extensoMeses(n); }
function extensoDias(n) { return extensoMeses(n); }
