<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora Impressão 3D</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
background:linear-gradient(135deg,#141414,#1e1e1e);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{

width:100%;
max-width:420px;

background:rgba(40,40,40,0.9);

backdrop-filter:blur(10px);

border-radius:18px;

padding:28px;

box-shadow:0 10px 35px rgba(0,0,0,0.6);
}

h2{
text-align:center;
margin-bottom:25px;
font-weight:600;
}

label{
font-size:14px;
opacity:0.9;
}

input{

width:100%;

padding:12px;

margin-top:6px;
margin-bottom:16px;

border-radius:8px;

border:none;

background:#2c2c2c;

color:white;

font-size:15px;

}

input:focus{
outline:2px solid #00c853;
}

.tempo-grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

}

button{

width:100%;

padding:14px;

background:linear-gradient(135deg,#00c853,#00e676);

border:none;

border-radius:10px;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:0.2s;

}

button:hover{
transform:scale(1.02);
}

.resultado{

margin-top:20px;

background:#0f0f0f;

border-radius:12px;

padding:18px;

line-height:1.6;

font-size:15px;

box-shadow:inset 0 0 10px rgba(0,0,0,0.6);

}

.total{
font-weight:600;
}

.venda{
color:#00ff88;
font-weight:700;
font-size:17px;
}

@media (max-width:420px){

.container{
padding:22px;
}

h2{
font-size:20px;
}

}

</style>

</head>
<body>

<div class="container">

<h2>🖨️ Calculadora Impressão 3D</h2>

<label>Potência da impressora (Watts)</label>
<input type="number" id="potencia" placeholder="Ex: 350">

<label>Tempo de impressão</label>

<div class="tempo-grid">
<input type="number" id="horas" placeholder="Horas">
<input type="number" id="minutos" placeholder="Minutos">
</div>

<label>Valor do kWh (R$)</label>
<input type="number" step="0.01" id="kwh" placeholder="Ex: 0.95">

<label>Peso do filamento usado (gramas)</label>
<input type="number" step="0.01" id="peso" placeholder="Ex: 120">

<label>Preço do kg do filamento (R$)</label>
<input type="number" step="0.01" id="filamento" placeholder="Ex: 90">

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

function calcular(){

let potencia = parseFloat(document.getElementById("potencia").value);

let horas = parseFloat(document.getElementById("horas").value) || 0;
let minutos = parseFloat(document.getElementById("minutos").value) || 0;

let kwh = parseFloat(document.getElementById("kwh").value);

let peso = parseFloat(document.getElementById("peso").value);

let filamento = parseFloat(document.getElementById("filamento").value);

let tempoTotal = horas + (minutos / 60);

let consumo = (potencia/1000) * tempoTotal;

let custoEnergia = consumo * kwh;

let custoFilamento = (peso/1000) * filamento;

let custoTotal = custoEnergia + custoFilamento;

let venda = custoTotal * 6;

document.getElementById("resultado").innerHTML = `
⏱ Tempo total: <b>${tempoTotal.toFixed(2)} horas</b><br><br>

⚡ Consumo Energia: ${consumo.toFixed(2)} kWh<br>

💡 Custo Energia: R$ ${custoEnergia.toFixed(2)}<br>

🧵 Custo Filamento: R$ ${custoFilamento.toFixed(2)}<br><br>

💰 <span class="total">Custo Total: R$ ${custoTotal.toFixed(2)}</span><br><br>

🏷️ Valor de Venda: <span class="venda">R$ ${venda.toFixed(2)}</span>
`;

}

</script>

</body>
</html>
