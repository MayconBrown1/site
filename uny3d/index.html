<!doctype html>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Outfit', sans-serif; }
    html, body { height: 100%; margin: 0; }

    .product-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.12);
    }

    .badge-low {
      animation: pulse-badge 2s ease-in-out infinite;
    }
    @keyframes pulse-badge {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .banner-shine {
      background-size: 200% 100%;
      animation: shine 3s ease-in-out infinite;
    }
    @keyframes shine {
      0% { background-position: 100% 0; }
      50% { background-position: 0 0; }
      100% { background-position: 100% 0; }
    }

    .whatsapp-btn {
      transition: all 0.25s ease;
    }
    .whatsapp-btn:hover {
      transform: scale(1.04);
      filter: brightness(1.1);
    }

    .product-img-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 12px 12px 0 0;
    }
    .product-img-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.04) 100%);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up {
      animation: fadeUp 0.5s ease forwards;
      opacity: 0;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>

 </head>

    </div>

  function formatPrice(value) {
    return "R$ " + value.toFixed(2).replace(".", ",");

  // ─── Gerar HTML dos produtos ───
  function renderProducts() {
    const grid = document.getElementById("products-grid");
    grid.innerHTML = "";

    const accent = config.accent_color || defaultConfig.accent_color;

  ) +

'</div>' +

  lucide.createIcons();
}

  // ─── Aplicar configurações visuais ───
  function applyConfig(config) {
    const bg = config.background_color || defaultConfig.background_color;
    const header = config.header_color || defaultConfig.header_color;
    const accent = config.accent_color || defaultConfig.accent_color;
    const text = config.text_color || defaultConfig.text_color;
    const card = config.card_color || defaultConfig.card_color;

    document.getElementById("app").style.backgroundColor = bg;
    document.querySelector("header").style.backgroundColor = header;

    const companyEl = document.getElementById("company-name");
    companyEl.textContent = config.company_name || defaultConfig.company_name;
    companyEl.style.color = bg;

    const bannerEl = document.getElementById("banner");
    bannerEl.style.background = "linear-gradient(135deg, " + accent + ", " + accent + "cc, " + accent + ", " + accent + "88)";
    bannerEl.style.backgroundSize = "200% 100%";
    bannerEl.style.color = bg;

    document.getElementById("banner-text").textContent = config.banner_text || defaultConfig.banner_text;

    if (config.whatsapp_number) whatsappNumber = config.whatsapp_number;

    // Re-render products with new colors
    renderProducts();

document.addEventListener("DOMContentLoaded", function () {
