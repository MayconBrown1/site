<!DOCTYPE html>
<html lang="pt-br">
<head>

  <!-- Google tag (gtag.js) -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lista de Contatos | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .badge-notif {
      position: absolute;
      top: -8px;
      right: -10px;
      background: #dc2626;
      color: white;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      line-height: 1;
      animation: pulse-badge 1.5s infinite;
      pointer-events: none;
    }
    @keyframes pulse-badge {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }
    .nav-contato-wrapper {
      position: relative;
      display: inline-block;
    }
    tr.nao-lida td {
      background-color: #eef2ff;
      font-weight: 600;
    }
  </style>
  <script>
    function toggleMenu() {
      const menu = document.getElementById('mobile-menu');
      menu.classList.toggle('hidden');
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- Navbar -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <a href="/admin/index.html">
        <img src="/img/logo-brown-preto.png" alt="Maycon Brown" class="h-10" />
      </a>
      <button class="md:hidden focus:outline-none" onclick="toggleMenu()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <nav class="hidden md:flex space-x-4 items-center">
        <a href="/admin/index.html" class="hover:text-indigo-600">Início</a>
        <a href="/softwares-admin.html" class="hover:text-indigo-600">Softwares</a>
        <a href="/matrizes-admin.html" class="hover:text-indigo-600">Matrizes</a>
        <span class="nav-contato-wrapper">
          <a href="/painel-mensagens.html" class="text-indigo-600 font-semibold">Contato</a>
          <span id="badge-desktop" class="badge-notif hidden">0</span>
        </span>
      </nav>
    </div>
    <div id="mobile-menu" class="hidden md:hidden px-4 pb-4">
      <nav class="flex flex-col space-y-2">
        <a href="/admin/index.html" class="hover:text-indigo-600">Início</a>
        <a href="/softwares-admin.html" class="hover:text-indigo-600">Softwares</a>
        <a href="/matrizes-admin.html" class="hover:text-indigo-600">Matrizes</a>
        <span class="nav-contato-wrapper" style="width:fit-content">
          <a href="/painel-mensagens.html" class="text-indigo-600 font-semibold">Contato</a>
          <span id="badge-mobile" class="badge-notif hidden">0</span>
        </span>
      </nav>
    </div>
  </header>

  <div class="container mx-auto p-4">
    <h1 class="text-3xl font-bold mb-6 text-center">Mensagens Recebidas</h1>
    <div class="overflow-x-auto bg-white shadow-lg rounded-xl">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-indigo-600 text-white">
          <tr>
            <th class="px-4 py-2 text-left">Nome</th>
            <th class="px-4 py-2 text-left">Email</th>
            <th class="px-4 py-2 text-left">WhatsApp</th>
            <th class="px-4 py-2 text-left">Data</th>
            <th class="px-4 py-2 text-left">Ações</th>
          </tr>
        </thead>
        <tbody id="contatoList" class="divide-y divide-gray-300"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
    <div class="bg-white p-6 rounded-xl shadow-xl w-full max-w-md relative">
      <h2 class="text-xl font-semibold mb-4">Mensagem do Contato</h2>
      <p id="modalMensagem" class="whitespace-pre-wrap text-gray-700 max-h-96 overflow-y-auto"></p>
      <button onclick="fecharModal()" class="mt-6 bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">Fechar</button>
    </div>
  </div>

  <!-- Botão flutuante de Sair -->
  <button id="logout" class="fixed top-14 right-14 bg-red-600 hover:bg-red-700 text-white font-semibold px-4 py-2 rounded-full shadow-lg z-50">
    Sair
  </button>

  <!-- Firebase v11 Módulo -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
    import {
      getFirestore, collection, orderBy, onSnapshot,
      query, doc, deleteDoc, updateDoc, getDoc, setDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDrt1bbLUjT8uzILn_cLgeRSDdMAM2ZHmI",
      authDomain: "mayconbrown-bda8c.firebaseapp.com",
      projectId: "mayconbrown-bda8c",
      storageBucket: "mayconbrown-bda8c.firebasestorage.app",
      messagingSenderId: "226624962636",
      appId: "1:226624962636:web:410ad40aa6099ca57474e9",
      measurementId: "G-Y1BTTK576V"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const tbody = document.getElementById("contatoList");
    const modal = document.getElementById("modal");
    const modalMensagem = document.getElementById("modalMensagem");
    const badgeDesktop = document.getElementById("badge-desktop");
    const badgeMobile = document.getElementById("badge-mobile");

    // ── Som de notificação gerado por Web Audio API ──────────────────────
    function tocarNotificacao() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "sine";
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      } catch (e) {
        // silencioso se o navegador bloquear
      }
    }

    // ── Atualiza os badges na navbar ─────────────────────────────────────
    function atualizarBadge(count) {
      [badgeDesktop, badgeMobile].forEach(b => {
        if (count > 0) {
          b.textContent = count > 99 ? "99+" : count;
          b.classList.remove("hidden");
        } else {
          b.classList.add("hidden");
        }
      });
      // Título da aba
      if (count > 0) {
        document.title = `(${count}) Lista de Contatos | Admin`;
      } else {
        document.title = "Lista de Contatos | Admin";
      }
    }

    // ── Abre o modal e marca a mensagem como lida ─────────────────────────
    function abrirModal(mensagem, docId, rowEl) {
      modalMensagem.textContent = mensagem;
      modal.classList.remove("hidden");
      // Marca como lida no Firestore
      if (docId) {
        updateDoc(doc(db, "contatos", docId), { lida: true }).catch(() => {});
      }
      // Remove destaque visual da linha imediatamente
      if (rowEl) rowEl.classList.remove("nao-lida");
    }

    function fecharModal() {
      modal.classList.add("hidden");
    }

    // ── Autenticação ─────────────────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = "/admin/login.html";
    });

    document.getElementById("logout").addEventListener("click", () => {
      signOut(auth).then(() => { window.location.href = "/admin/login.html"; });
    });

    // ── Listener de mensagens ─────────────────────────────────────────────
    let primeiraRenderizacao = true;
    let idsConhecidos = new Set();

    const contatosRef = collection(db, "contatos");
    const q = query(contatosRef, orderBy("data", "desc"));

    onSnapshot(q, (snapshot) => {
      tbody.innerHTML = "";
      let naoLidas = 0;

      snapshot.forEach((docSnap) => {
        const contato = docSnap.data();
        const data = contato.data ? new Date(contato.data).toLocaleString("pt-BR") : "";
        const mensagem = contato.mensagem || "Mensagem não encontrada.";
        const lida = contato.lida === true;

        if (!lida) naoLidas++;

        // Detecta mensagem nova (chegou após a primeira carga)
        const ehNova = !primeiraRenderizacao && !idsConhecidos.has(docSnap.id) && !lida;
        if (ehNova) tocarNotificacao();
        idsConhecidos.add(docSnap.id);

        const row = document.createElement("tr");
        row.classList.add("hover:bg-gray-100");
        if (!lida) row.classList.add("nao-lida");

        const nomeTd = document.createElement("td");
        nomeTd.className = "px-4 py-2 cursor-pointer";
        nomeTd.textContent = contato.nome || "";
        nomeTd.addEventListener("click", () => abrirModal(mensagem, docSnap.id, row));

        const emailTd = document.createElement("td");
        emailTd.className = "px-4 py-2 cursor-pointer";
        emailTd.textContent = contato.email || "";
        emailTd.addEventListener("click", () => abrirModal(mensagem, docSnap.id, row));

        const whatsappTd = document.createElement("td");
        whatsappTd.className = "px-4 py-2 cursor-pointer";
        whatsappTd.textContent = contato.whatsapp || "";
        whatsappTd.addEventListener("click", () => abrirModal(mensagem, docSnap.id, row));

        const dataTd = document.createElement("td");
        dataTd.className = "px-4 py-2 cursor-pointer text-sm text-gray-500";
        dataTd.textContent = data;
        dataTd.addEventListener("click", () => abrirModal(mensagem, docSnap.id, row));

        const acoesTd = document.createElement("td");
        acoesTd.className = "px-4 py-2";
        const btn = document.createElement("button");
        btn.className = "text-red-600 hover:underline";
        btn.textContent = "Apagar";
        btn.addEventListener("click", () => apagarMensagem(docSnap.id));
        acoesTd.appendChild(btn);

        row.appendChild(nomeTd);
        row.appendChild(emailTd);
        row.appendChild(whatsappTd);
        row.appendChild(dataTd);
        row.appendChild(acoesTd);
        tbody.appendChild(row);
      });

      atualizarBadge(naoLidas);
      primeiraRenderizacao = false;
    });

    // ── Apagar mensagem ───────────────────────────────────────────────────
    window.apagarMensagem = function(id) {
      if (confirm("Tem certeza que deseja apagar essa mensagem?")) {
        deleteDoc(doc(db, "contatos", id))
          .then(() => alert("Mensagem apagada com sucesso."))
          .catch(err => {
            console.error("Erro:", err);
            alert("Erro ao apagar a mensagem.");
          });
      }
    };

    // Fecha modal ao clicar fora
    modal.addEventListener("click", (e) => {
      if (e.target === modal) fecharModal();
    });

    window.fecharModal = fecharModal;
  </script>

  <!-- Rodapé -->
  <footer class="bg-white border-t py-6 mt-16 text-center text-sm text-gray-500">
    <p>&copy; 2026 Maycon Brown. Todos os direitos reservados.</p>
  </footer>
</body>
</html>
